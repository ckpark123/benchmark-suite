name: Case validation

on:
  pull_request:
    paths:
      - 'cases/**'
      - 'rubrics/**'
      - 'src/types.ts'
      - 'scripts/validate-cases.ts'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate-cases
